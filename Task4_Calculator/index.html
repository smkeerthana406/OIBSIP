<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perfect Calculator</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#0a0f1f;
font-family:Arial;
}

.calculator{
background:rgba(0,140,255,0.08);
padding:20px;
border-radius:20px;
width:320px;
box-shadow:0 0 30px #008cff;
border:1px solid #008cff;
}

.display{
width:100%;
height:65px;
background:#111827;
color:#00aaff;
font-size:28px;
text-align:right;
padding:10px;
border-radius:10px;
margin-bottom:10px;
border:1px solid #008cff;
}

.top{
display:flex;
gap:10px;
margin-bottom:10px;
}

.top button{
flex:1;
padding:10px;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

.on{background:#00ff88;}
.off{background:#ff3b3b;color:white;}

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
}

button{
padding:16px;
font-size:18px;
border:none;
border-radius:10px;
cursor:pointer;
background:#111827;
color:#00aaff;
border:1px solid #008cff;
}

button:hover{
background:#00aaff;
color:black;
}

.equal{
background:#00aaff;
color:black;
font-weight:bold;
}

.clear{
background:red;
color:white;
}
</style>
</head>

<body>

<div class="calculator">

<div id="display" class="display">OFF</div>

<div class="top">
<button class="on" onclick="turnOn()">ON</button>
<button class="off" onclick="turnOff()">OFF</button>
</div>

<div class="grid">

<!-- ROW 1 -->
<button onclick="append('7')">7</button>
<button onclick="append('8')">8</button>
<button onclick="append('9')">9</button>
<button onclick="append('/')">÷</button>

<!-- ROW 2 -->
<button onclick="append('4')">4</button>
<button onclick="append('5')">5</button>
<button onclick="append('6')">6</button>
<button onclick="append('*')">×</button>

<!-- ROW 3 -->
<button onclick="append('1')">1</button>
<button onclick="append('2')">2</button>
<button onclick="append('3')">3</button>
<button onclick="append('-')">−</button>

<!-- ROW 4 -->
<button onclick="append('0')">0</button>
<button onclick="append('.')">.</button>
<button onclick="calculate()" class="equal">=</button>
<button onclick="append('+')">+</button>

</div>

</div>

<script>

let display=document.getElementById("display");
let isOn=false;

function turnOn(){
isOn=true;
display.innerText="0";
}

function turnOff(){
isOn=false;
display.innerText="OFF";
}

function append(value){
if(!isOn) return;

if(display.innerText==="0" || display.innerText==="OFF"){
display.innerText=value;
}else{
display.innerText+=value;
}
}

function calculate(){
if(!isOn) return;

try{
display.innerText=eval(display.innerText);
}catch{
display.innerText="Error";
}
}

</script>

</body>
</html>
